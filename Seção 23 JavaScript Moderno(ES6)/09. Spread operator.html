<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript ES6</title>
</head>
<body style="background-color: #333;">
    <script>
        // 7 Spread Operator
        const a1 = [1,2,3];
        const a2 = [4,5,6];

        const a3 = [...a1,...a2];

        console.log(a3);

        const a4 = [0,...a1,4];

        console.log(a4);

        const carNome = {nome: 'Gol'}
        const carMarca = {marca: 'VW'}
        const outrasinfo = {km: 100000}

        const car = {...carNome, ...carMarca, ...outrasinfo, wheels: 4}

        console.log(car);
    </script>
</body>
</html>
