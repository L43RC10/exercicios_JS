<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript ES6</title>
</head>
<body style="background-color: #333;">
    <script>
        // 6 Destructuring
        const frutas = ['Maçã', 'Laranja', 'Mamão'];
        const [f1, f2, f3] = frutas;

        console.log(f1);
        console.log(f3);
        console.log(f2);


        const produtoDetalhes = {
            nome: 'Mouse',
            preço: 39.99,
            categoria: 'Periféricos',
            cor: 'Cinza'
        }
        
        const {
            nome: produtoNome,
            preço,
            categoria: produtoCategoria,
            cor
        } = produtoDetalhes;

        console.log(`O nome do produto é ${produtoNome}, custaR$${preço}, pertence a categoria ${produtoCategoria} e é da cor ${cor}`);
    </script>
</body>
</html>
