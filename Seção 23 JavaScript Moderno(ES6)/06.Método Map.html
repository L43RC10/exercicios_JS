<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript ES6</title>
</head>
<body style="background-color: #333;">
    <script>
        // 4 map
        const produtos = [
            {name: 'Camisa', preço: 10.99, categoria: 'Roupas'},
            {name: 'Chaleira Elétrica', preço: 10.99, categoria: 'Eletro'},
            {name: 'Fogão', preço: 10.99, categoria: 'Eletro'},
            {name: 'Camisa', preço: 10.99, categoria: 'Roupas'},
        ]

        produtos.map((produto) => {
            if(produto.categoria === 'Roupas'){
                produto.onSale = true;
            }
        });

        console.log(produtos);
    </script>
</body>
</html>
